<div class="app-container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">APM</span>
      <span class="logo-sub">TIS Circuits</span>
    </div>

    <nav class="nav-menu">

      <!-- ADMIN -->
      <ng-container *ngIf="isAdmin()">
        <a routerLink="/dashboard" routerLinkActive="active">
          <span class="icon">📊</span> Dashboard
        </a>
        <a routerLink="/dashboard/reporting" routerLinkActive="active">
          <span class="icon">📈</span> Reporting
        </a>
        <a routerLink="/admin/users" routerLinkActive="active">
          <span class="icon">👥</span> Utilisateurs
        </a>
        <a routerLink="/admin/departements" routerLinkActive="active">
          <span class="icon">🏭</span> Départements
        </a>
        <a routerLink="/admin/processus" routerLinkActive="active">
          <span class="icon">⚙️</span> Processus
        </a>
      </ng-container>

      <!-- MANAGER -->
      <ng-container *ngIf="isManager()">
        <a routerLink="/dashboard" routerLinkActive="active">
          <span class="icon">📊</span> Dashboard
        </a>
        <a routerLink="/plans" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <span class="icon">📋</span> Plans Usine
        </a>
        <a routerLink="/plans/mes-plans" routerLinkActive="active">
          <span class="icon">📁</span> Mes Plans
        </a>
      </ng-container>

      <!-- RESPONSABLE -->
      <ng-container *ngIf="isResponsable()">
        <a routerLink="/actions/mes-actions" routerLinkActive="active">
          <span class="icon">✅</span> Mes Actions
        </a>
      </ng-container>

      <!-- COMMUN -->
      <a routerLink="/notifications" routerLinkActive="active">
        <span class="icon">🔔</span> Notifications
      </a>

    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          {{ getInitiales() }}
        </div>
        <div class="user-details">
          <span class="user-name">{{ user?.fullName }}</span>
          <span class="user-role">{{ getRoleBadge() }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">Déconnexion</button>
    </div>
  </aside>

  <!-- Contenu principal -->
  <main class="main-content">
    <router-outlet />
  </main>

</div>
