<div class="page">
  <div class="form-card">
    <div class="form-header">
      <a [routerLink]="['/plans', planId]" class="retour">← Retour au plan</a>
      <h1>Nouvelle Action</h1>
    </div>

    <div class="erreur" *ngIf="erreur">{{ erreur }}</div>

    <div class="form-body">
      <div class="manual-hint">
        Référence manuel: renseigner thème, PREV/CORR, anomalie/amélioration, criticité, responsable et délai.
      </div>
      <div class="form-group">
        <label>Thème *</label>
        <input type="text" [(ngModel)]="action.theme" placeholder="Thème de l'action" />
      </div>

      <div class="form-group">
        <label>Anomalie / Amélioration</label>
        <textarea [(ngModel)]="action.anomalyDescription" rows="2" placeholder="Description de l'anomalie..."></textarea>
      </div>

      <div class="form-group">
        <label>Action à réaliser *</label>
        <textarea [(ngModel)]="action.actionDescription" rows="3" placeholder="Décrivez l'action..."></textarea>
      </div>

      <div class="form-group">
        <label>Cause</label>
        <input type="text" [(ngModel)]="action.cause" placeholder="Cause du problème" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Type *</label>
          <select [(ngModel)]="action.type">
            <option value="Corrective">Correctif</option>
            <option value="Preventive">Préventif</option>
          </select>
        </div>
        <div class="form-group">
          <label>PREV/CORR *</label>
          <select [(ngModel)]="action.prevCorr">
            <option value="Corrective">Correctif</option>
            <option value="Preventive">Préventif</option>
          </select>
        </div>
        <div class="form-group">
          <label>Criticité *</label>
          <select [(ngModel)]="action.criticity">
            <option value="High">Haute</option>
            <option value="Medium">Moyenne</option>
            <option value="Low">Basse</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Responsable *</label>
          <select [(ngModel)]="action.responsibleId">
            <option value="">Sélectionner...</option>
            <option *ngFor="let u of users" [value]="u.id">{{ u.fullName }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Délai *</label>
          <input type="date" [(ngModel)]="action.deadline" />
        </div>
      </div>
      <div class="form-group">
        <label>Commentaire</label>
        <textarea [(ngModel)]="action.commentaire" rows="2" placeholder="Commentaire optionnel..."></textarea>
      </div>
    </div>

    <div class="form-footer">
      <a [routerLink]="['/plans', planId]" class="btn-secondary">Annuler</a>
      <button class="btn-primary" (click)="creer()" [disabled]="chargement">
        {{ chargement ? 'Création...' : 'Créer l\'action' }}
      </button>
    </div>
  </div>
</div>
