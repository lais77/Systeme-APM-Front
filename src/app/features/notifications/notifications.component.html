<div class="page">
  <div class="page-header">
    <h1>Notifications</h1>
    <button class="btn-secondary" (click)="marquerToutLu()">Tout marquer comme lu</button>
  </div>

  <div class="loading" *ngIf="chargement">Chargement...</div>

  <div class="notifications-list" *ngIf="!chargement">
    <div
      *ngFor="let notif of notifications"
      class="notification-card"
      [class.unread]="!notif.isRead"
    >
      <div class="notif-icon">🔔</div>
      <div class="notif-content">
        <h4>{{ notif.title }}</h4>
        <p>{{ notif.message }}</p>
        <span class="notif-date">{{ notif.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
      </div>
      <div class="notif-actions" *ngIf="!notif.isRead">
        <button class="btn-icon" (click)="marquerLu(notif.id)">✓</button>
      </div>
    </div>
    <div class="empty" *ngIf="notifications.length === 0">
      Aucune notification.
    </div>
  </div>
</div>
